<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HS Analyzer Pro | Jamila Moussaoui</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #38bdf8; --bg: #020617; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 40px; width: 100%; max-width: 550px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { font-weight: 300; letter-spacing: 5px; color: var(--accent); text-align: center; margin-bottom: 5px; text-transform: uppercase; }
        p.subtitle { text-align: center; opacity: 0.6; font-size: 0.8rem; margin-top: 0; margin-bottom: 30px; }
        .section { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        label { display: block; margin-bottom: 10px; font-size: 0.85rem; font-weight: 600; color: var(--accent); }
        input[type="text"], input[type="file"] { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(56, 189, 248, 0.1); }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #7dd3fc; transform: translateY(-2px); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }
        #result { margin-top: 30px; padding: 25px; border-radius: 18px; background: rgba(0,0,0,0.4); display: none; border-left: 4px solid var(--accent); white-space: pre-wrap; line-height: 1.7; font-size: 0.95rem; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>HS Analyzer</h1>
    <p class="subtitle">Expert System by Jamila Moussaoui</p>

    <div class="section">
        <label>🔍 Consultation par Produit</label>
        <input type="text" id="productInput" placeholder="Ex: Smartphones, Ventilateurs...">
        <button class="btn btn-primary" onclick="lancerAnalyse('text')">Consulter ADIL</button>
    </div>

    <div class="section">
        <label>📂 Auditer Document</label>
        <input type="file" id="fileInput">
        <button class="btn btn-secondary" onclick="lancerAnalyse('file')">Analyser Fichier</button>
    </div>

    <div id="result"></div>
</div>

<script>
    // IMPORTANTE: Crea una clave nueva en Google AI Studio y pégala aquí
    const API_KEY = "AIzaSyBh0ptv5SmhbLpnw-e3s5LoqT93H5Qeqis"; 

    async function lancerAnalyse(type) {
        const resBox = document.getElementById('result');
        resBox.style.display = 'block';
        resBox.innerHTML = "⏳ Analyse en cours...";

        let prompt = "";
        if (type === 'text') {
            const val = document.getElementById('productInput').value;
            if (!val) return alert("Veuillez saisir un produit.");
            prompt = `Tu es un expert en douane marocaine (ADIL). Analyse ce produit pour le tarif 2026 : ${val}. Donne le code SH, les droits d'importation et la TVA.`;
        } else {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("Veuillez choisir un fichier.");
            prompt = `Analyse la conformité douanière de ce document : ${file.name}.`;
        }

        try {
            // URL estable v1 que acepta gemini-1.5-flash
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                resBox.innerHTML = "❌ <strong>Erreur:</strong> " + data.error.message;
            } else {
                const textResult = data.candidates[0].content.parts[0].text;
                resBox.innerHTML = "<strong>RAPPORT EXPERT :</strong><br><br>" + textResult.replace(/\n/g, '<br>');
            }
        } catch (e) {
            resBox.innerHTML = "❌ Erreur de connexion au serveur.";
        }
    }
</script>

</body>
</html>
