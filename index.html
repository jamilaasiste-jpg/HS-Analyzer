<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ADIL Expert v2.0</title>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid #38bdf8; }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; }
        button { background: #38bdf8; color: black; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color:#38bdf8">ADIL EXPERT PRO</h2>
        
        <label>🌐 Langue / Idioma:</label>
        <select id="lang">
            <option value="fr">Français</option>
            <option value="ar">العربية</option>
            <option value="es">Español</option>
            <option value="en">Englais</option>
        </select>

        <input type="text" id="p" placeholder="Produit (ex: Smartphone)">
        
        <label>📄 Contraste de documents:</label>
        <input type="file" id="f">
        
        <button onclick="analizar()">LANCER L'EXPERTISE</button>
        <div id="result"></div>
    </div>

    <script>
        async function analizar() {
            const res = document.getElementById('result');
            const key = "AIzaSyDgrEliv_R0fxe4qzAr3p97agphxl7g_vU"; // <--- ESTA ES LA QUE NO DEBES MOSTRAR
            
            res.style.display = 'block';
            res.innerHTML = "⏳ Analyse en cours...";

            // Aquí es donde el código decide qué idioma usar y si hay documento
            const prompt = `Expert douanier Maroc. Réponds en ${document.getElementById('lang').value}. Analyse le produit/document: ${document.getElementById('p').value}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                res.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
            } catch (e) {
                res.innerHTML = "❌ Erreur de connexion (Clé API expirée ou bloquée).";
            }
        }
    </script>
</body>
</html>
