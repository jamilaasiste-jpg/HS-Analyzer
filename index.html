<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HS Analyzer | Jamila Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #38bdf8; }
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 40px; width: 100%; max-width: 600px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { font-weight: 300; letter-spacing: 5px; color: var(--accent); text-align: center; margin-bottom: 5px; }
        .section { margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; background: var(--accent); color: #000; font-size: 1rem; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); }
        #result { margin-top: 25px; padding: 20px; border-radius: 15px; background: rgba(0,0,0,0.4); display: none; border-left: 4px solid var(--accent); white-space: pre-wrap; line-height: 1.6; font-size: 0.95rem; }
        .loading { color: var(--accent); font-style: italic; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>HS ANALYZER</h1>
        <p style="text-align:center; opacity:0.6; font-size:0.8rem; margin-top:0;">Expert System by Jamila Moussaoui</p>
        <div class="section">
            <label>🔍 Consultation par Produit</label>
            <input type="text" id="productInput" placeholder="Ex: Ventilateurs industriels, 8517...">
            <button class="btn" onclick="analyser()">CONSULTER ADIL</button>
        </div>
        <div id="result"></div>
    </div>

    <script>
        const API_KEY = "AIzaSyCr6lGXsnQ8zjEMOP8ZNwCWjVmDKhvyyis";

        async function analyser() {
            const input = document.getElementById('productInput').value;
            const resBox = document.getElementById('result');
            
            if(!input) return alert("Saisissez un produit");

            resBox.style.display = 'block';
            resBox.innerHTML = '<span class="loading">🧠 Analyse intelligente en cours...</span>';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Agis en tant qu'expert douanier marocain. Analyse l'article suivant et donne le code SH, les droits de douane et la TVA applicables au Maroc en 2026: " + input }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    resBox.innerHTML = "❌ <strong>Erreur API:</strong> " + data.error.message;
                } else if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const texto = data.candidates[0].content.parts[0].text;
                    resBox.innerHTML = "<strong>ANALYSE EXPERTE :</strong><br><br>" + texto.replace(/\n/g, '<br>');
                } else {
                    resBox.innerHTML = "❌ Réponse inattendue de l'IA. Réessayez.";
                }
            } catch (error) {
                resBox.innerHTML = "❌ Erreur de connexion. Vérifiez si la clé API est active.";
            }
        }
    </script>
</body>
</html>
