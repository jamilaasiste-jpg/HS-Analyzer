<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HS Analyzer Pro | AI Powered</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #38bdf8; }
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 40px; width: 100%; max-width: 600px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { font-weight: 300; letter-spacing: 5px; color: var(--accent); text-align: center; margin-bottom: 5px; }
        .section { margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; margin-top: 10px; }
        #result { margin-top: 25px; padding: 20px; border-radius: 15px; background: rgba(0,0,0,0.4); display: none; border-left: 4px solid var(--accent); white-space: pre-wrap; line-height: 1.6; font-size: 0.95rem; }
        .loading { color: var(--accent); font-style: italic; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>HS ANALYZER</h1>
        <p style="text-align:center; opacity:0.6; font-size:0.8rem; margin-top:0;">Système Expert de Jamila Moussaoui</p>

        <div class="section">
            <label>🔍 Consultation par Produit</label>
            <input type="text" id="productInput" placeholder="Entrez le nom du produit ou code SH...">
            <button class="btn btn-primary" id="btnProduct" onclick="llamarIA('product')">CONSULTER ADIL</button>
        </div>

        <div class="section">
            <label>📂 Analyser Document (Image/PDF)</label>
            <input type="file" id="fileInput" accept="image/*,.pdf">
            <button class="btn btn-secondary" id="btnFile" onclick="llamarIA('file')">AUDITER DOCUMENT</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        const API_KEY = "AIzaSyBa01HGPNn2joaTmGrTJcFnA-Xbm8u0Zcw"; // Tu llave ya integrada

        async function llamarIA(modo) {
            const resBox = document.getElementById('result');
            const input = document.getElementById('productInput').value;
            
            resBox.style.display = 'block';
            resBox.innerHTML = '<span class="loading">🧠 L\'IA analyse vos données douanières...</span>';

            let prompt = "";
            if(modo === 'product') {
                if(!input) return alert("Veuillez saisir un produit.");
                prompt = `Agis comme un expert en douane marocaine (ADIL). Analyse le produit ou code suivant: ${input}. Donne le code SH probable, les droits de douane et la TVA.`;
            } else {
                resBox.innerHTML = "✅ Document reçu. (Analyse visuelle en cours de configuration...)";
                return;
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                const textoIA = data.candidates[0].content.parts[0].text;
                resBox.innerHTML = `<strong>RÉSULTAT DE L'ANALYSE :</strong><br><br>${textoIA.replace(/\n/g, '<br>')}`;
            } catch (error) {
                resBox.innerHTML = "❌ Erreur de connexion. Vérifiez votre clé API ou votre connexion internet.";
            }
        }
    </script>
</body>
</html>
