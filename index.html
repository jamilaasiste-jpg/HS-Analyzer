<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HS Analyzer | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #020617);
            color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; padding: 60px; width: 450px;
            text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        h1 { font-weight: 200; letter-spacing: 8px; color: #38bdf8; margin: 0; }
        .signature { color: #38bdf8; opacity: 0.7; font-size: 0.9rem; margin-bottom: 40px; letter-spacing: 2px; }
        .btn-modern {
            background: linear-gradient(135deg, #38bdf8, #1d4ed8);
            border: none; color: white; padding: 20px; border-radius: 20px;
            width: 100%; font-weight: bold; cursor: pointer; margin: 10px 0;
            transition: 0.3s; font-size: 1rem;
        }
        .btn-modern:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(56, 189, 248, 0.4); }
    </style>
</head> 
<body>
    <div class="glass-panel">
<script>
        function iniciarAnalisis(tipo) {
            const mensaje = tipo === 'adil' ? 
                "Iniciando experto ADIL... Por favor, prepare su código arancelario." : 
                "Cargando módulo de Auditoría Documental...";
            
            alert(mensaje);
            // Aquí conectaremos la API en el siguiente paso
        }

        // Asignamos las funciones a tus botones vanguardistas
        document.querySelectorAll('.btn-modern')[0].onclick = () => iniciarAnalisis('adil');
        document.querySelectorAll('.btn-modern')[1].onclick = () => iniciarAnalisis('audit');
    </script>        <h1>HS ANALYZER</h1>
        <div class="signature">DESIGNED BY JAMILA MOUSSAOUI</div>
        <button class="btn-modern">🛡️ ANALYSE ADIL</button>
        <button class="btn-modern" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">👁️ AUDIT DOCUMENTAIRE</button>
    </div>
</body>
</html>
